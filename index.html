
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:transparent;color:var(--color-text-primary,#111);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
select{font-family:inherit;font-size:13px;border:0.5px solid var(--color-border-tertiary,#ddd);border-radius:8px;padding:7px 10px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#111);outline:none;cursor:pointer}
.team-btn{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e5e5e5);border-radius:14px;padding:18px;cursor:pointer;text-align:left;transition:border-color 0.15s;display:flex;flex-direction:column;gap:8px;width:100%}
.team-btn:hover{border-color:var(--tc)}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e5e5e5);border-radius:14px;padding:14px 16px;transition:border-color 0.15s}
.card:hover{border-color:var(--tc,#378ADD)}
.avatar{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:contain;padding:4px}
.back-btn{background:transparent;border:0.5px solid var(--color-border-tertiary,#ddd);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--color-text-secondary,#666);display:inline-flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--color-background-secondary,#f5f5f5)}
.grid-teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.chart-box{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#e5e5e5);border-radius:14px;padding:16px;margin-bottom:14px}
.donut-wrap{position:relative;width:130px;height:130px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.legend-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 5px;border-radius:5px;transition:background 0.1s}
.legend-row.clickable{cursor:pointer}
.legend-row.clickable:hover{background:var(--color-background-secondary,#f5f5f5)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.pill-toggle{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;border:1.5px solid var(--color-border-secondary,#ccc);background:transparent;color:var(--color-text-secondary,#666);transition:all 0.15s;cursor:pointer}
.pill-toggle.active{color:#fff;border-color:transparent}
.bool-btn{border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;border:1.5px solid var(--color-border-secondary,#ccc);background:transparent;color:var(--color-text-primary,#111);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.bool-btn:hover{background:var(--color-background-secondary,#f5f5f5)}
.modal-backdrop{background:rgba(0,0,0,0.4);border-radius:16px;padding:32px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--color-background-primary,#fff);border-radius:14px;padding:24px;width:100%;max-width:680px}
.copy-btn{border-radius:8px;padding:8px 16px;font-size:12px;font-weight:500;border:0.5px solid var(--color-border-secondary,#ccc);background:transparent;color:var(--color-text-primary,#111);cursor:pointer;transition:all 0.15s}
.copy-btn:hover{background:var(--color-background-secondary,#f5f5f5)}
.bool-text{font-family:monospace;font-size:12px;background:var(--color-background-secondary,#f5f5f5);border:0.5px solid var(--color-border-tertiary,#eee);border-radius:8px;padding:14px;word-break:break-word;line-height:1.7;color:var(--color-text-primary,#111);max-height:260px;overflow-y:auto;white-space:pre-wrap}
#app{padding:16px 2px 32px}
</style>

function pal(n){return PALETTES[(n.charCodeAt(0)+n.charCodeAt(n.length-1))%PALETTES.length];}
function ini(n){return n.replace(/[^a-zA-Z\s]/g,"").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()||"?";}

function parseSize(s){
  if(!s)return 0;
  const n=parseInt(s.replace(/[^0-9]/g,"")||"0");
  return n;
}

function getRegion(l){
  if(!l)return"Unknown";
  const v=l.toLowerCase();
  if(v.match(/usa|united states|\bus\b|san francisco|new york|seattle|boston|chicago|austin|menlo park|los gatos|irvine|san jose|san mateo|redmond|cupertino|santa clara|mountain view|sunnyvale|denver|houston|fairfax|omaha|new jersey|plymouth|detroit|armonk/))return"Americas";
  if(v.match(/brazil|brasil|são paulo|sao paulo|rio de janeiro|porto alegre|natal|curitiba|campo bom/))return"Americas";
  if(v.match(/canada|toronto|montreal|ottawa/))return"Americas";
  if(v.match(/argentina|buenos aires|uruguay|montevideo|mexico|mexico city|colombia|peru|chile/))return"Americas";
  if(v.match(/germany|berlin|munich|hamburg|frankfurt|cologne|stuttgart|düsseldorf|dusseldorf|herzogenaurach|pullach|hannover|hanover|walldorf|würzburg|wurzburg|sarstedt|leipzig/))return"Europe";
  if(v.match(/france|paris|lezennes|aix-en-provence/))return"Europe";
  if(v.match(/\buk\b|united kingdom|london|manchester|birmingham/))return"Europe";
  if(v.match(/netherlands|amsterdam|zaandam|utrecht|hoofddorp/))return"Europe";
  if(v.match(/sweden|stockholm|switzerland|spain|madrid|barcelona|italy|milan|rome/))return"Europe";
  if(v.match(/poland|warsaw|portugal|lisbon|belgium|brussels|antwerp|austria|vienna|schladming/))return"Europe";
  if(v.match(/ireland|dublin|kilkenny|czech|prague|brno|estonia|tallinn|lithuania|vilnius/))return"Europe";
  if(v.match(/romania|bucharest|turkey|istanbul|ukraine|kyiv|belarus|minsk|norway|finland|denmark|cyprus/))return"Europe";
  if(v.match(/china|beijing|shanghai|shenzhen|hangzhou|hong kong/))return"Asia-Pacific";
  if(v.match(/japan|tokyo|singapore|india|bengaluru|bangalore|gurgaon|mumbai|delhi/))return"Asia-Pacific";
  if(v.match(/indonesia|jakarta|australia|melbourne|sydney|south korea|seoul/))return"Asia-Pacific";
  if(v.match(/uae|dubai|sharjah|israel|tel aviv|saudi/))return"Middle East";
  return"Other";
}

let cur=null,chartInst=null,chartMode="region",filterRegion="All",showModal=false;

function dedup(arr){const s=new Set();return arr.filter(c=>{const k=c.c.toLowerCase();if(s.has(k))return false;s.add(k);return true;});}
function sortBySize(arr){return [...arr].sort((a,b)=>parseSize(b.s)-parseSize(a.s));}
function getFiltered(){
  let list=sortBySize(dedup(TEAMS[cur].companies));
  if(filterRegion!=="All")list=list.filter(c=>getRegion(c.l)===filterRegion);
  return list;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(showModal){renderModal();return;}
  if(!cur)renderHome();else renderTeam();
}

function renderHome(){
  document.getElementById("app").innerHTML=`

        <button class="team-btn" style="--tc:${TEAMS[t].color}" onclick="openTeam('${t.replace(/'/g,"\\'")}')">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:26px">${TEAMS[t].icon}</span>
            <span style="font-size:12px;font-weight:500;color:${TEAMS[t].color};background:${TEAMS[t].bg};border-radius:12px;padding:3px 10px">${dedup(TEAMS[t].companies).length}</span>

        </button>
      `).join("")}
    </div>`;
}

      <button class="back-btn" onclick="goHome()">← All teams</button>
      <span style="font-size:19px">${t.icon}</span>
      <span style="font-size:19px;font-weight:500;color:var(--color-text-primary,#111)">${cur}</span>
      <span style="margin-left:auto;font-size:12px;font-weight:500;color:${co};background:${t.bg};border-radius:20px;padding:4px 14px">${all.length} companies</span>
    </div>

    <div class="chart-box">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:500;color:var(--color-text-secondary,#aaa);text-transform:uppercase;letter-spacing:0.6px">Breakdown by</span>
        <button class="pill-toggle active" id="pill-region" style="background:${co};border-color:${co}" onclick="setChartMode('region')">Region</button>
        <button class="pill-toggle" id="pill-industry" onclick="setChartMode('industry')">Industry</button>
      </div>
      <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
        <div class="donut-wrap"><canvas id="donutChart"></canvas>
          <div class="donut-center">
            <span style="font-size:22px;font-weight:500;color:var(--color-text-primary,#111)">${all.length}</span>
            <span style="font-size:10px;color:var(--color-text-secondary,#aaa)">companies</span>
          </div>
        </div>
        <div id="legend" style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px"></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <select onchange="doFilterRegion(this.value)" style="font-size:13px">
        ${regions.map(r=>`<option value="${r}" ${r===filterRegion?"selected":""}>${r==="All"?"All regions":r}</option>`).join("")}
      </select>
      <button class="bool-btn" onclick="openModal()" style="color:${co};border-color:${co}">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="flex-shrink:0"><rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="1" y="11" width="12" height="2" rx="1" fill="currentColor"/></svg>
        Generate boolean
      </button>
    </div>

    <div id="grid" class="grid-cards">${renderCards(filtered,co,t.bg)}</div>
    <div style="margin-top:10px;font-size:11px;color:var(--color-text-tertiary,#bbb);text-align:right" id="count">Showing ${filtered.length} of ${all.length} · sorted by size</div>
  `;
  setTimeout(drawChart,80);
}

function renderCards(list,co,bg){
  if(!list.length)return`<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--color-text-secondary,#aaa)">No companies in this region.</div>`;
  return list.map(c=>{
    const p=pal(c.c);
    const region=getRegion(c.l);
    const logoUrl=LOGOS[c.c];
    const avatarHtml=logoUrl
      ?`<div class="avatar" style="background:#fff;border:0.5px solid var(--color-border-tertiary,#eee)"><img src="${logoUrl}" alt="${c.c}" onerror="this.parentNode.style.background='${p.bg}';this.parentNode.innerHTML='<span style=\\'color:${p.fg};font-size:13px;font-weight:500\\'>${ini(c.c)}</span>'" style="width:100%;height:100%;object-fit:contain;padding:4px"></div>`
      :`<div class="avatar" style="background:${p.bg};color:${p.fg}">${ini(c.c)}</div>`;
    return`<div class="card" style="--tc:${co}">
      <div style="display:flex;align-items:center;gap:12px">
        ${avatarHtml}
        <div style="flex:1;min-width:0">
          <div style="font-weight:500;font-size:14px;color:var(--color-text-primary,#111);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.c}</div>
          <div style="font-size:12px;color:var(--color-text-secondary,#888);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.i||"—"}</div>
        </div>
        <span style="font-size:10px;font-weight:500;color:${co};background:${bg};border-radius:5px;padding:2px 8px;white-space:nowrap;flex-shrink:0">${region}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px">
        <div style="background:var(--color-background-secondary,#f8f8f8);border-radius:7px;padding:7px 9px">
          <div style="font-size:10px;color:var(--color-text-tertiary,#bbb);font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:2px">Size</div>
          <div style="font-size:12px;color:var(--color-text-primary,#333);font-weight:500">${c.s||"—"}</div>
        </div>
        <div style="background:var(--color-background-secondary,#f8f8f8);border-radius:7px;padding:7px 9px">
          <div style="font-size:10px;color:var(--color-text-tertiary,#bbb);font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:2px">Location</div>
          <div style="font-size:12px;color:var(--color-text-primary,#333);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.l||"—"}</div>
        </div>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary,#f0f0f0)">
        <a href="https://www.linkedin.com/search/results/people/?currentCompany=${encodeURIComponent(c.c)}" target="_blank" style="font-size:12px;color:${co};text-decoration:none;font-weight:500">Search on LinkedIn →</a>
      </div>
    </div>`;
  }).join("");
}

function generateBoolean(){
  const t=TEAMS[cur];
  const all=sortBySize(dedup(t.companies));
  const isAllRegions=filterRegion==="All";
  const companies=isAllRegions?all:all.filter(c=>getRegion(c.l)===filterRegion);
  const companyNames=companies.map(c=>`"${c.c}"`).join(" OR ");
  let locationClause="";
  if(!isAllRegions){
    const regionKeywords={
      "Americas":["United States","USA","Canada","Brazil","Argentina","Mexico","Colombia","Uruguay","Chile","Peru"],
      "Europe":["Germany","France","United Kingdom","Netherlands","Sweden","Switzerland","Spain","Italy","Poland","Belgium","Austria","Ireland","Denmark","Portugal","Romania","Turkey","Estonia","Lithuania","Czech Republic","Finland","Norway","Cyprus","Belarus","Ukraine"],
      "Asia-Pacific":["China","Japan","Singapore","India","Australia","Indonesia","South Korea","Malaysia","Thailand","Vietnam"],
      "Middle East":["UAE","Dubai","Israel","Saudi Arabia"],
    };
    const kws=regionKeywords[filterRegion]||[filterRegion];
    locationClause=` AND (${kws.map(k=>`"${k}"`).join(" OR ")})`;
  }
  return`(${companyNames})${locationClause}`;
}

function openModal(){showModal=true;render();}
function closeModal(){showModal=false;render();setTimeout(drawChart,80);}

function renderModal(){
  const t=TEAMS[cur];
  const co=t.color;
  const bool=generateBoolean();
  const label=filterRegion==="All"?"all regions":filterRegion;
  const all=sortBySize(dedup(t.companies));
  const count=filterRegion==="All"?all.length:all.filter(c=>getRegion(c.l)===filterRegion).length;

  document.getElementById("app").innerHTML=`
    <div class="modal-backdrop" style="min-height:520px">
      <div class="modal-box">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px">
          <div>
            <div style="font-size:16px;font-weight:500;color:var(--color-text-primary,#111);margin-bottom:4px">Boolean search string</div>
            <div style="font-size:12px;color:var(--color-text-secondary,#888)">${cur} · ${label} · ${count} companies</div>
          </div>
          <button onclick="closeModal()" style="background:transparent;border:0.5px solid var(--color-border-tertiary,#ddd);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--color-text-secondary,#666);cursor:pointer;flex-shrink:0">Close</button>
        </div>
        <div style="font-size:12px;color:var(--color-text-secondary,#888);margin-bottom:8px">Paste directly into LinkedIn Recruiter, Boolean search engines, or ATS sourcing fields.</div>
        <div class="bool-text" id="boolText">${bool}</div>
        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
          <button class="copy-btn" id="copyBtn" onclick="copyBool()">Copy to clipboard</button>
          <div style="font-size:11px;color:var(--color-text-secondary,#888);display:flex;align-items:center;gap:4px">
            <span style="background:var(--color-background-secondary,#f5f5f5);border-radius:4px;padding:2px 6px;font-family:monospace;font-size:11px">Ctrl+A</span> then
            <span style="background:var(--color-background-secondary,#f5f5f5);border-radius:4px;padding:2px 6px;font-family:monospace;font-size:11px">Ctrl+C</span> to select all
          </div>
        </div>
        <div style="margin-top:16px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary,#eee)">
          <div style="font-size:11px;color:var(--color-text-secondary,#888);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px">Tips</div>
          <div style="font-size:12px;color:var(--color-text-secondary,#888);line-height:1.7">
            Use in <strong>LinkedIn Recruiter</strong> "Current company" + "Location" fields for best results.<br>
            Combine with role titles like <em>AND ("Product Manager" OR "Senior PM")</em> to narrow results.<br>
            Works in <strong>GitHub</strong>, <strong>X-Ray search</strong>, and <strong>Google</strong> sourcing queries.
          </div>
        </div>
      </div>
    </div>`;
}

function copyBool(){
  const text=generateBoolean();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById("copyBtn");
    if(btn){btn.textContent="Copied!";setTimeout(()=>{if(btn)btn.textContent="Copy to clipboard";},2000);}
  }).catch(()=>{
    const el=document.getElementById("boolText");
    if(el){const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
  });
}

function setChartMode(mode){
  chartMode=mode;
  const co=TEAMS[cur].color;
  ["region","industry"].forEach(m=>{
    const b=document.getElementById("pill-"+m);
    if(!b)return;
    if(m===mode){b.classList.add("active");b.style.background=co;b.style.borderColor=co;b.style.color="#fff";}
    else{b.classList.remove("active");b.style.background="transparent";b.style.borderColor="var(--color-border-secondary,#ccc)";b.style.color="var(--color-text-secondary,#666)";}
  });
  drawChart();
}

function doFilterRegion(v){filterRegion=v;redrawList();}

function redrawList(){
  const t=TEAMS[cur];
  const all=sortBySize(dedup(t.companies));
  const filtered=getFiltered();
  const g=document.getElementById("grid");
  if(g)g.innerHTML=renderCards(filtered,t.color,t.bg);
  const ct=document.getElementById("count");
  if(ct)ct.textContent=`Showing ${filtered.length} of ${all.length} · sorted by size`;
}

function drawChart(){
  const canvas=document.getElementById("donutChart");
  const legend=document.getElementById("legend");
  if(!canvas||!legend)return;
  const all=sortBySize(dedup(TEAMS[cur].companies));
  const counts={};
  all.forEach(c=>{
    const key=chartMode==="region"?getRegion(c.l):(c.i||"Unknown");
    counts[key]=(counts[key]||0)+1;
  });
  let data=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(chartMode==="industry"&&data.length>8){
    const other=data.slice(7).reduce((s,[,v])=>s+v,0);
    data=[...data.slice(0,7),["Other",other]];
  }
  const labels=data.map(([k])=>k);
  const vals=data.map(([,v])=>v);
  const total=vals.reduce((s,v)=>s+v,0);
  const bgC=CHART_COLORS.slice(0,labels.length);
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(canvas,{
    type:"doughnut",
    data:{labels,datasets:[{data:vals,backgroundColor:bgC,borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw} (${Math.round(ctx.raw/total*100)}%)`}}}}
  });
  legend.innerHTML=labels.map((l,i)=>`
    <div class="legend-row ${chartMode==='region'?'clickable':''}" onclick="${chartMode==='region'?`doFilterRegion('${l}')`:``}">
      <span class="legend-dot" style="background:${bgC[i]}"></span>
      <span style="flex:1;color:var(--color-text-secondary,#555);font-size:12px">${l}</span>
      <span style="font-weight:500;color:var(--color-text-primary,#111);font-size:12px">${vals[i]}</span>
      <span style="color:var(--color-text-tertiary,#bbb);min-width:30px;text-align:right;font-size:11px">${Math.round(vals[i]/total*100)}%</span>
    </div>`).join("");
}

render();
</script>
